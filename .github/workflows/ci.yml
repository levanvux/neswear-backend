name: Backend CI

on:
  push:
    branches:
      - main
      - staging
      - develop
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/neswear-backend:latest
            ghcr.io/${{ github.repository_owner }}/neswear-backend:${{ github.sha }}

      - name: Trigger deploy repository
        if: github.event_name == 'push'
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            ENV="prod"
          elif [ "${GITHUB_REF_NAME}" = "staging" ]; then
            ENV="staging"
          else
            ENV="dev"
          fi

          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_REPO_TOKEN }}" \
            https://api.github.com/repos/levanvux/neswear-deploy/dispatches \
            -d "{\"event_type\":\"deploy\",\"client_payload\":{\"environment\":\"$ENV\"}}"
